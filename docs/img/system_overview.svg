<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Hiragino Sans, Yu Gothic UI, Segoe UI, sans-serif">
  <defs>
    <style>
      .enclosure { fill: #f8fafa; stroke: #2a313d; stroke-width: 2; }
      .enclosure-label { font-size: 16px; font-weight: 800; fill: #1a1d23; }
      .enclosure-sub { font-size: 11px; fill: #6b7280; }

      .part { stroke: #1a1d23; stroke-width: 1.2; }
      .part-mcu { fill: #1f3a5f; }
      .part-mcu-text { fill: #fff; font-weight: 700; font-size: 13px; }
      .part-mcu-sub  { fill: #cfe2ff; font-size: 10px; }

      .part-display { fill: #102a43; }
      .part-display-text { fill: #fff; font-weight: 700; font-size: 12px; }

      .part-amp { fill: #5b8dd6; }
      .part-pca { fill: #5b8dd6; }
      .part-amp-text { fill: #fff; font-weight: 700; font-size: 12px; }

      .part-toggle { fill: #2a313d; }
      .part-toggle-text { fill: #fff; font-size: 9px; font-weight: 700; text-anchor: middle; }

      .part-mic { fill: #006b6b; }
      .part-mic-text { fill: #fff; font-weight: 700; font-size: 12px; }

      .part-sp { fill: #0f1115; }
      .part-sp-text { fill: #fff; font-weight: 700; font-size: 12px; }

      .part-servo { fill: #ff9f1c; }
      .part-servo-text { fill: #1a1d23; font-size: 9px; font-weight: 700; text-anchor: middle; }

      .part-esp { fill: #c2185b; }
      .part-esp-text { fill: #fff; font-weight: 700; font-size: 13px; }
      .part-esp-sub  { fill: #ffd6e0; font-size: 10px; }

      .part-rain { fill: #1f5d99; }
      .part-rain-text { fill: #fff; font-weight: 700; font-size: 12px; }

      .label { font-size: 11px; fill: #4b5563; }
      .label-small { font-size: 10px; fill: #6b7280; }

      .wire-i2s    { stroke: #2ec4b6; stroke-width: 2.4; fill: none; }
      .wire-i2c    { stroke: #ff9f1c; stroke-width: 2.4; fill: none; }
      .wire-spi    { stroke: #6ea8fe; stroke-width: 2.4; fill: none; }
      .wire-gpio   { stroke: #ff7ab6; stroke-width: 2.4; fill: none; }
      .wire-pwm    { stroke: #f8b500; stroke-width: 1.6; fill: none; }
      .wire-audio  { stroke: #1a1d23; stroke-width: 2.6; fill: none; }
      .wire-uart   { stroke: #c2185b; stroke-width: 2.4; fill: none; }
      .wire-wifi   { stroke: #6c5ce7; stroke-width: 2.4; fill: none; stroke-dasharray: 5 3; }
      .wire-label  { font-size: 10px; font-weight: 700; }

      .legend-box { fill: #fff; stroke: #cbd5e1; stroke-width: 1; }
    </style>
  </defs>

  <!-- タイトル -->
  <text x="550" y="28" font-size="18" font-weight="800" text-anchor="middle" fill="#1a1d23">
    IchiPing システム構成 — コントローラ筐体 + House 模型
  </text>
  <text x="550" y="46" font-size="11" text-anchor="middle" fill="#6b7280">
    1 マイク + 1 Ping で 32 状態推定 / 降雨センサ + M5Stamp Pico (Wi-Fi) でクラウド連携
  </text>

  <!-- ============ コントローラ筐体 ============ -->
  <rect class="enclosure" x="40" y="80" width="500" height="560" rx="14"/>
  <text class="enclosure-label" x="60" y="106">コントローラ筐体</text>
  <text class="enclosure-sub"   x="60" y="122">MCU + UI + サーボ/オーディオドライバ + Wi-Fi モジュール</text>

  <!-- MCU FRDM-MCXN947 -->
  <rect class="part part-mcu" x="200" y="200" width="200" height="120" rx="6"/>
  <text class="part-mcu-text" x="300" y="232" text-anchor="middle">FRDM-MCXN947</text>
  <text class="part-mcu-sub"  x="300" y="250" text-anchor="middle">Cortex-M33 + NPU + PowerQuad</text>
  <text class="part-mcu-sub"  x="300" y="266" text-anchor="middle">SAI / I²C / LPSPI / GPIO / LPUART</text>
  <!-- MCU 端子マーカ -->
  <!-- 左側: SPI(240), LPUART(290) -->
  <circle cx="200" cy="240" r="3" fill="#fff"/>
  <circle cx="200" cy="290" r="3" fill="#fff"/>
  <!-- 右側: I²S(220), I²S mic(250), I²C(280) -->
  <circle cx="400" cy="220" r="3" fill="#fff"/>
  <circle cx="400" cy="250" r="3" fill="#fff"/>
  <circle cx="400" cy="280" r="3" fill="#fff"/>
  <!-- 上側: GPIO 雨センサ(380) -->
  <circle cx="380" cy="200" r="3" fill="#fff"/>
  <!-- 下側: GPIO トグル×5(290-310), EXEC(370) -->
  <circle cx="290" cy="320" r="3" fill="#fff"/>
  <circle cx="295" cy="320" r="3" fill="#fff"/>
  <circle cx="300" cy="320" r="3" fill="#fff"/>
  <circle cx="305" cy="320" r="3" fill="#fff"/>
  <circle cx="310" cy="320" r="3" fill="#fff"/>
  <circle cx="370" cy="320" r="3" fill="#fff"/>

  <!-- ディスプレイ ILI9341 -->
  <rect class="part part-display" x="60" y="160" width="120" height="80" rx="4"/>
  <rect x="68" y="168" width="104" height="58" fill="#1f7ae0" stroke="none"/>
  <text class="part-display-text" x="120" y="198" text-anchor="middle">ILI9341</text>
  <text x="120" y="214" text-anchor="middle" font-size="9" fill="#cfe2ff">2.4" TFT 240×320</text>

  <!-- アンプ MAX98357A -->
  <rect class="part part-amp" x="430" y="160" width="100" height="50" rx="4"/>
  <text class="part-amp-text" x="480" y="180" text-anchor="middle">MAX98357A</text>
  <text x="480" y="196" text-anchor="middle" font-size="9" fill="#dbe9ff">I²S Class-D 3.2W</text>

  <!-- サーボドライバ PCA9685 -->
  <rect class="part part-pca" x="430" y="280" width="100" height="50" rx="4"/>
  <text class="part-amp-text" x="480" y="300" text-anchor="middle">PCA9685</text>
  <text x="480" y="316" text-anchor="middle" font-size="9" fill="#dbe9ff">I²C 16ch PWM</text>

  <!-- ============ Controller 下部レイアウト ============
       配線重なりを完全に避けるための新配置:
       - トグル ×5: 左側 (x=60-300, y=440-486)
       - EXEC: 中央 (x=340-400, y=440-486)
       - M5Stamp Pico: 下段 (x=60-260, y=510-590)
       配線:
       - トグル GPIO: 各トグル top → 上→右→上で MCU 下辺 pin(290-310) へ
       - EXEC GPIO:  EXEC top → 直上ストレートで MCU 下辺 pin(370) へ (toggle wire を回避)
       - M5Stamp UART: M5Stamp 左edge → 筐体左壁経由 → MCU 左 pin(200,290) へ
       - M5Stamp Wi-Fi: M5Stamp 右edge → 筐体右に向けて出る (外部クラウドへの口)
       全配線がそれぞれ独立した corridor を使い、重なり無し。
  -->

  <!-- トグルスイッチ ×5 -->
  <text x="60" y="426" font-size="11" font-weight="700" fill="#1a1d23">トグルスイッチ ×5（真値入力）</text>
  <g>
    <g transform="translate(60,440)">
      <rect class="part part-toggle" width="40" height="46" rx="6"/>
      <circle cx="20" cy="18" r="6" fill="#7be0a4"/>
      <rect x="17" y="14" width="6" height="14" fill="#1a1d23"/>
      <text class="part-toggle-text" x="20" y="42">窓 a</text>
    </g>
    <g transform="translate(110,440)">
      <rect class="part part-toggle" width="40" height="46" rx="6"/>
      <circle cx="20" cy="18" r="6" fill="#7be0a4"/>
      <rect x="17" y="14" width="6" height="14" fill="#1a1d23"/>
      <text class="part-toggle-text" x="20" y="42">窓 b</text>
    </g>
    <g transform="translate(160,440)">
      <rect class="part part-toggle" width="40" height="46" rx="6"/>
      <circle cx="20" cy="18" r="6" fill="#7be0a4"/>
      <rect x="17" y="14" width="6" height="14" fill="#1a1d23"/>
      <text class="part-toggle-text" x="20" y="42">窓 c</text>
    </g>
    <g transform="translate(210,440)">
      <rect class="part part-toggle" width="40" height="46" rx="6"/>
      <circle cx="20" cy="30" r="6" fill="#ff7ab6"/>
      <rect x="17" y="18" width="6" height="14" fill="#1a1d23"/>
      <text class="part-toggle-text" x="20" y="42">扉 AB</text>
    </g>
    <g transform="translate(260,440)">
      <rect class="part part-toggle" width="40" height="46" rx="6"/>
      <circle cx="20" cy="30" r="6" fill="#ff7ab6"/>
      <rect x="17" y="18" width="6" height="14" fill="#1a1d23"/>
      <text class="part-toggle-text" x="20" y="42">扉 BC</text>
    </g>
  </g>

  <!-- EXEC ボタン — トグル右の独立コラム -->
  <text x="340" y="426" font-size="11" font-weight="700" fill="#1a1d23">EXEC</text>
  <g transform="translate(340,440)">
    <rect class="part" x="0" y="0" width="60" height="46" rx="6" fill="#c2185b"/>
    <circle cx="30" cy="20" r="10" fill="#fff" stroke="#1a1d23" stroke-width="1.2"/>
    <text x="30" y="42" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">EXEC</text>
  </g>

  <!-- M5Stamp Pico (ESP32-PICO-D4) — 下段、トグル列とは別段 -->
  <g transform="translate(60,510)">
    <rect class="part part-esp" width="200" height="80" rx="6"/>
    <!-- 両側ピンヘッダ -->
    <g fill="#ffd6e0">
      <rect x="6"   y="10" width="6" height="5"/>
      <rect x="6"   y="22" width="6" height="5"/>
      <rect x="6"   y="34" width="6" height="5"/>
      <rect x="6"   y="46" width="6" height="5"/>
      <rect x="6"   y="58" width="6" height="5"/>
      <rect x="188" y="10" width="6" height="5"/>
      <rect x="188" y="22" width="6" height="5"/>
      <rect x="188" y="34" width="6" height="5"/>
      <rect x="188" y="46" width="6" height="5"/>
      <rect x="188" y="58" width="6" height="5"/>
    </g>
    <text class="part-esp-text" x="100" y="32" text-anchor="middle">M5Stamp Pico</text>
    <text class="part-esp-sub"  x="100" y="48" text-anchor="middle">ESP32-PICO-D4 (Wi-Fi)</text>
    <text class="part-esp-sub"  x="100" y="64" text-anchor="middle">UART ↔ MCU / Wi-Fi ↔ クラウド</text>
    <!-- antenna icon -->
    <path d="M178,75 Q186,69 178,61" fill="none" stroke="#fff" stroke-width="1.5"/>
    <path d="M182,79 Q194,69 182,57" fill="none" stroke="#fff" stroke-width="1.5"/>
  </g>

  <!-- ============ コントローラ筐体内の配線（重なりなし） ============ -->

  <!-- MCU -> ILI9341 (SPI) -->
  <path class="wire-spi" d="M200,240 L180,240 L180,200"/>
  <text class="wire-label" x="146" y="252" fill="#6ea8fe">SPI</text>

  <!-- MCU -> MAX98357A (I²S) -->
  <path class="wire-i2s" d="M400,220 L420,220 L420,185 L430,185"/>
  <text class="wire-label" x="406" y="178" fill="#2ec4b6">I²S</text>

  <!-- MCU -> PCA9685 (I²C) -->
  <path class="wire-i2c" d="M400,280 L420,280 L420,305 L430,305"/>
  <text class="wire-label" x="406" y="328" fill="#ff9f1c">I²C</text>

  <!-- Toggles -> MCU 下辺 (GPIO ×5) — 各 toggle 上端から左下に bend して MCU pin(290-310) へ -->
  <path class="wire-gpio" d="M80,440 L80,405 L290,405 L290,320"/>
  <path class="wire-gpio" d="M130,440 L130,400 L295,400 L295,320"/>
  <path class="wire-gpio" d="M180,440 L180,395 L300,395 L300,320"/>
  <path class="wire-gpio" d="M230,440 L230,390 L305,390 L305,320"/>
  <path class="wire-gpio" d="M280,440 L280,385 L310,385 L310,320"/>
  <text class="wire-label" x="80" y="420" fill="#ff7ab6">GPIO ×5</text>

  <!-- EXEC -> MCU 下辺 (GPIO) — 真上ストレート、トグル列とは完全分離 -->
  <path class="wire-gpio" d="M370,440 L370,320"/>
  <text class="wire-label" x="376" y="380" fill="#ff7ab6">GPIO (EXEC)</text>

  <!-- M5Stamp Pico → MCU 左 (LPUART) — 筐体左壁経由で MCU 左 pin(200,290) へ -->
  <path class="wire-uart" d="M60,550 L50,550 L50,290 L200,290"/>
  <text class="wire-label" x="56" y="420" fill="#c2185b" transform="rotate(-90, 56, 420)">UART (LPUART)</text>

  <!-- M5Stamp Pico → 筐体外 (Wi-Fi) — 右に抜けてクラウドへ -->
  <path class="wire-wifi" d="M260,550 L545,550"/>
  <text class="wire-label" x="280" y="544" fill="#6c5ce7">Wi-Fi → 外部クラウド (MQTT / HTTP)</text>

  <!-- ============ House 模型 ============ -->
  <rect class="enclosure" x="600" y="80" width="460" height="560" rx="14"/>
  <text class="enclosure-label" x="620" y="106">House 模型</text>
  <text class="enclosure-sub"   x="620" y="122">降雨センサ（屋外）+ スピーカ + マイク + 窓・扉サーボ ×5</text>

  <!-- 降雨センサ — SPK の真上、屋外設置 -->
  <g transform="translate(820,140)">
    <rect class="part part-rain" width="190" height="60" rx="4"/>
    <!-- rain-drop visual -->
    <line x1="14" y1="14" x2="11" y2="28" stroke="#9ec4ff" stroke-width="2"/>
    <line x1="28" y1="16" x2="25" y2="32" stroke="#9ec4ff" stroke-width="2"/>
    <line x1="42" y1="14" x2="39" y2="28" stroke="#9ec4ff" stroke-width="2"/>
    <line x1="16" y1="38" x2="48" y2="38" stroke="#cfe2ff" stroke-width="1.4"/>
    <line x1="16" y1="48" x2="48" y2="48" stroke="#cfe2ff" stroke-width="1.4"/>
    <text class="part-rain-text" x="115" y="22" text-anchor="middle">降雨センサ (YL-83)</text>
    <text x="115" y="38" text-anchor="middle" font-size="10" fill="#cfe2ff">屋外設置</text>
    <text x="115" y="52" text-anchor="middle" font-size="9" fill="#cfe2ff">GPIO デジタル入力</text>
  </g>

  <!-- スピーカ (8Ω 0.25W) — 降雨センサの真下 -->
  <g transform="translate(820,215)">
    <rect class="part part-sp" x="0" y="0" width="190" height="40" rx="4"/>
    <circle cx="22" cy="20" r="14" fill="#2a313d" stroke="#fff" stroke-width="1"/>
    <circle cx="22" cy="20" r="8" fill="#1a1d23"/>
    <circle cx="22" cy="20" r="3" fill="#fff"/>
    <text class="part-sp-text" x="115" y="18" text-anchor="middle" fill="#fff">SPK 8Ω 0.25W</text>
    <text x="115" y="33" text-anchor="middle" font-size="9" fill="#cfe2ff">フルレンジ 45mm</text>
  </g>

  <!-- マイク INMP441 -->
  <g transform="translate(820,270)">
    <rect class="part part-mic" x="0" y="0" width="190" height="40" rx="4"/>
    <text class="part-mic-text" x="95" y="18" text-anchor="middle">INMP441</text>
    <text x="95" y="33" text-anchor="middle" font-size="9" fill="#cfe2ff">I²S MEMS mic 24-bit</text>
  </g>

  <!-- 5 サーボ (窓3 + 扉2) を縦並びに -->
  <g>
    <g transform="translate(820,325)">
      <rect class="part part-servo" width="190" height="40" rx="4"/>
      <circle cx="22" cy="20" r="10" fill="#1a1d23"/>
      <rect x="32" y="14" width="14" height="12" fill="#1a1d23"/>
      <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1d23">SG90 サーボ</text>
      <text x="115" y="33" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1d23">窓 a</text>
    </g>
    <g transform="translate(820,380)">
      <rect class="part part-servo" width="190" height="40" rx="4"/>
      <circle cx="22" cy="20" r="10" fill="#1a1d23"/>
      <rect x="32" y="14" width="14" height="12" fill="#1a1d23"/>
      <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1d23">SG90 サーボ</text>
      <text x="115" y="33" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1d23">窓 b</text>
    </g>
    <g transform="translate(820,435)">
      <rect class="part part-servo" width="190" height="40" rx="4"/>
      <circle cx="22" cy="20" r="10" fill="#1a1d23"/>
      <rect x="32" y="14" width="14" height="12" fill="#1a1d23"/>
      <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1d23">SG90 サーボ</text>
      <text x="115" y="33" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1d23">窓 c</text>
    </g>
    <g transform="translate(820,490)">
      <rect class="part part-servo" width="190" height="40" rx="4"/>
      <circle cx="22" cy="20" r="10" fill="#1a1d23"/>
      <rect x="32" y="14" width="14" height="12" fill="#1a1d23"/>
      <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1d23">SG90 サーボ</text>
      <text x="115" y="33" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1d23">扉 AB</text>
    </g>
    <g transform="translate(820,545)">
      <rect class="part part-servo" width="190" height="40" rx="4"/>
      <circle cx="22" cy="20" r="10" fill="#1a1d23"/>
      <rect x="32" y="14" width="14" height="12" fill="#1a1d23"/>
      <text x="115" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1d23">SG90 サーボ</text>
      <text x="115" y="33" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1d23">扉 BC</text>
    </g>
  </g>

  <!-- ============ 筐体間ケーブル ============ -->

  <!-- 降雨センサ → MCU (GPIO) — MCU 上辺 pin から上→右に抜け、他デバイスと重ならない -->
  <path class="wire-gpio" d="M380,200 L380,145 L820,145"/>
  <text class="wire-label" x="500" y="138" fill="#ff7ab6">GPIO (rain detect)</text>

  <!-- MAX98357A (530,185) -> スピーカ (820,235) -->
  <path class="wire-audio" d="M530,185 L585,185 L585,235 L820,235"/>
  <text class="wire-label" x="600" y="178" fill="#1a1d23">SPK (2 線)</text>

  <!-- MCU I²S (400,250) -> INMP441 (820,290) -->
  <path class="wire-i2s" d="M400,250 L595,250 L595,290 L820,290"/>
  <text class="wire-label" x="490" y="244" fill="#2ec4b6">I²S mic (BCLK/WS/SD)</text>

  <!-- PCA9685 -> 5 サーボ（PWM 5 線、左下から扇状に展開） -->
  <path class="wire-pwm" d="M530,285 L660,285 L660,345 L820,345"/>
  <path class="wire-pwm" d="M530,295 L655,295 L655,400 L820,400"/>
  <path class="wire-pwm" d="M530,305 L650,305 L650,455 L820,455"/>
  <path class="wire-pwm" d="M530,315 L645,315 L645,510 L820,510"/>
  <path class="wire-pwm" d="M530,325 L640,325 L640,565 L820,565"/>
  <text class="wire-label" x="556" y="375" fill="#f8b500">PWM ×5</text>

  <!-- ============ 凡例 ============ -->
  <g transform="translate(40,660)">
    <rect class="legend-box" x="0" y="0" width="1020" height="38" rx="4"/>
    <g transform="translate(14,22)">
      <line x1="0" y1="0" x2="22" y2="0" class="wire-i2s"/>
      <text x="28" y="4" font-size="11" fill="#1a1d23">I²S</text>
    </g>
    <g transform="translate(70,22)">
      <line x1="0" y1="0" x2="22" y2="0" class="wire-i2c"/>
      <text x="28" y="4" font-size="11" fill="#1a1d23">I²C</text>
    </g>
    <g transform="translate(125,22)">
      <line x1="0" y1="0" x2="22" y2="0" class="wire-spi"/>
      <text x="28" y="4" font-size="11" fill="#1a1d23">SPI</text>
    </g>
    <g transform="translate(180,22)">
      <line x1="0" y1="0" x2="22" y2="0" class="wire-gpio"/>
      <text x="28" y="4" font-size="11" fill="#1a1d23">GPIO（トグル / EXEC / 雨センサ）</text>
    </g>
    <g transform="translate(395,22)">
      <line x1="0" y1="0" x2="22" y2="0" class="wire-pwm"/>
      <text x="28" y="4" font-size="11" fill="#1a1d23">PWM ×5</text>
    </g>
    <g transform="translate(475,22)">
      <line x1="0" y1="0" x2="22" y2="0" class="wire-audio"/>
      <text x="28" y="4" font-size="11" fill="#1a1d23">SPK 線</text>
    </g>
    <g transform="translate(545,22)">
      <line x1="0" y1="0" x2="22" y2="0" class="wire-uart"/>
      <text x="28" y="4" font-size="11" fill="#1a1d23">UART (MCU↔M5Stamp Pico)</text>
    </g>
    <g transform="translate(750,22)">
      <line x1="0" y1="0" x2="22" y2="0" class="wire-wifi"/>
      <text x="28" y="4" font-size="11" fill="#1a1d23">Wi-Fi (M5Stamp→外部クラウド)</text>
    </g>
  </g>
</svg>
